<script>

function showToast(message, isError = true) {
    const toast = document.getElementById('toast');
    toast.innerHTML = message;
    toast.style.display = 'block';
    toast.style.backgroundColor = isError ? '#d9534f' : '#5cb85c';
    toast.className = 'toast-notification';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 3000);
}

function setButtonLoading(loading) {
    const btn = document.getElementById('submit_btn');
    if (loading) {
        btn.value = '⏳ Loading...';
        btn.style.opacity = '0.7';
        btn.disabled = true;
    } else {
        btn.value = 'Login';
        btn.style.opacity = '1';
        btn.disabled = false;
    }
}

function getBrowserFingerprint() {
    const screenData = `${screen.width}x${screen.height}x${screen.colorDepth}`;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const language = navigator.language;
    const platform = navigator.platform;
    const hardwareConcurrency = navigator.hardwareConcurrency || 'unknown';
    const deviceMemory = navigator.deviceMemory || 'unknown';
    
    return `Screen: ${screenData} | TZ: ${timezone} | Lang: ${language} | Platform: ${platform} | CPU: ${hardwareConcurrency} | RAM: ${deviceMemory}GB`;
}

let failedPasswordAttempts = 0;
const MAX_PASSWORD_ATTEMPTS = 3;
let isSubmitting = false;
let lockoutTimer = null;

function updateAttemptsWarning() {
    const remaining = MAX_PASSWORD_ATTEMPTS - failedPasswordAttempts;
    if (remaining <= 2 && remaining > 0 && failedPasswordAttempts > 0) {
        const warning = document.getElementById('error');
        warning.innerHTML = `Warning: ${remaining} valid attempt(s) remaining before account lock.`;
        warning.style.color = '#f0ad4e';
        setTimeout(() => {
            if (warning.innerHTML && warning.innerHTML.includes('Warning')) {
                if (failedPasswordAttempts < MAX_PASSWORD_ATTEMPTS) warning.innerHTML = '';
            }
        }, 3500);
    } else if (remaining === 0) {
        const warning = document.getElementById('error');
        warning.innerHTML = `Account temporarily locked due to ${MAX_PASSWORD_ATTEMPTS} failed password attempts. Please wait 30 seconds.`;
        warning.style.color = '#d9534f';
    }
}

function lockAccount() {
    const mailInput = document.getElementById('mail');
    const passInput = document.getElementById('pass');
    const submitBtn = document.getElementById('submit_btn');
    
    mailInput.disabled = true;
    passInput.disabled = true;
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.6';
    submitBtn.style.cursor = 'not-allowed';
    
    const errorSpan = document.getElementById('error');
    errorSpan.innerHTML = 'Too many failed password attempts. Account locked for 30 seconds.';
    errorSpan.style.color = '#d9534f';
    
    showToast('Account locked for 30 seconds due to repeated failed password attempts.', true);
    
    if (lockoutTimer) clearTimeout(lockoutTimer);
    lockoutTimer = setTimeout(() => {
        const mailElem = document.getElementById('mail');
        const passElem = document.getElementById('pass');
        const submitButton = document.getElementById('submit_btn');
        
        passElem.disabled = false;
        submitButton.disabled = false;
        submitButton.style.opacity = '1';
        submitButton.style.cursor = 'pointer';
        
        failedPasswordAttempts = 0;
        
        const errorSpanInner = document.getElementById('error');
        errorSpanInner.innerHTML = '';
        
        showToast('Account unlocked. You may try again.', false);
        
        lockoutTimer = null;
    }, 30000); // 30 SECONDS (30000 milliseconds)
}
